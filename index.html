<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Bikewatching</title>

  <link rel="stylesheet" href="global.css" />
  <link rel="stylesheet" href="map.css" />

  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />

  <link
    href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css"
    rel="stylesheet"
  />

  <script src="map.js" type="module"></script>
</head>

<body>
  <main>
    <header>
      <div class="header-left">
        <h1>🚴🏼‍♀️ Bikewatching</h1>

        <p>
          An interactive visualization of bike traffic and BlueBike stations
          in the Boston and Cambridge area.
        </p>
      </div>

      <div class="controls">
        <label>
          Filter by time:

          <input
            id="time-slider"
            type="range"
            min="-1"
            max="1439"
            value="-1"
          />

          <time id="selected-time"></time>
          <em id="any-time">(any time)</em>
        </label>
      </div>
    </header>

    <div id="map">
      <svg></svg>
    </div>

    <div class="legend">
      <strong>Traffic flow:</strong>
      <div style="--departure-ratio: 1">More departures</div>
      <div style="--departure-ratio: 0.5">Balanced</div>
      <div style="--departure-ratio: 0">More arrivals</div>
    </div>
  </main>
</body>
</html>
